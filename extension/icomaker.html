<!DOCTYPE html>
<html>
<head>
  <title>Icon Generator</title>
</head>
<body>
  <canvas id="c16" width="16" height="16"></canvas>
  <canvas id="c32" width="32" height="32"></canvas>
  <canvas id="c48" width="48" height="48"></canvas>
  <canvas id="c128" width="128" height="128"></canvas>
  
  <script>
    function drawIcon(canvas, size) {
      const ctx = canvas.getContext('2d');
      
      // Background (YouTube red gradient)
      const grad = ctx.createLinearGradient(0, 0, size, size);
      grad.addColorStop(0, '#FF0000');
      grad.addColorStop(1, '#CC0000');
      ctx.fillStyle = grad;
      ctx.fillRect(0, 0, size, size);
      
      // Rounded corners
      ctx.globalCompositeOperation = 'destination-in';
      ctx.beginPath();
      ctx.roundRect(0, 0, size, size, size * 0.15);
      ctx.fill();
      ctx.globalCompositeOperation = 'source-over';
      
      // Download arrow (white)
      ctx.fillStyle = '#FFFFFF';
      const arrowWidth = size * 0.5;
      const arrowHeight = size * 0.5;
      const x = (size - arrowWidth) / 2;
      const y = (size - arrowHeight) / 2 + size * 0.05;
      
      // Arrow shaft
      ctx.fillRect(x + arrowWidth * 0.35, y, arrowWidth * 0.3, arrowHeight * 0.6);
      
      // Arrow head
      ctx.beginPath();
      ctx.moveTo(x, y + arrowHeight * 0.5);
      ctx.lineTo(x + arrowWidth / 2, y + arrowHeight * 0.9);
      ctx.lineTo(x + arrowWidth, y + arrowHeight * 0.5);
      ctx.lineTo(x + arrowWidth * 0.75, y + arrowHeight * 0.5);
      ctx.lineTo(x + arrowWidth * 0.75, y + arrowHeight * 0.3);
      ctx.lineTo(x + arrowWidth * 0.25, y + arrowHeight * 0.3);
      ctx.lineTo(x + arrowWidth * 0.25, y + arrowHeight * 0.5);
      ctx.closePath();
      ctx.fill();
      
      // Base line
      ctx.fillRect(x + arrowWidth * 0.15, y + arrowHeight * 0.85, arrowWidth * 0.7, arrowHeight * 0.12);
      
      // Download PNG
      const link = document.createElement('a');
      link.download = `icon${size}.png`;
      link.href = canvas.toDataURL();
      link.click();
    }
    
    // Generate all sizes
    setTimeout(() => {
      drawIcon(document.getElementById('c16'), 16);
      drawIcon(document.getElementById('c32'), 32);
      drawIcon(document.getElementById('c48'), 48);
      drawIcon(document.getElementById('c128'), 128);
      alert('Icons downloaded! Move them to your extension/icons/ folder.');
    }, 100);
  </script>
</body>
</html>
