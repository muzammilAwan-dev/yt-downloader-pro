<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YT Downloader Pro</title>
  <style>
    :root {
      --bg-primary: #0f0f0f;
      --bg-secondary: #1a1a1a;
      --bg-tertiary: #252525;
      --accent-primary: #3ea6ff;
      --accent-hover: #65b8ff;
      --accent-active: #2a8fd4;
      --text-primary: #ffffff;
      --text-secondary: #aaaaaa;
      --text-muted: #717171;
      --border-color: #333333;
      --success: #4caf50;
      --warning: #ff9800;
      --error: #f44336;
      --shadow-sm: 0 2px 4px rgba(0,0,0,0.3);
      --shadow-md: 0 4px 12px rgba(0,0,0,0.4);
      --radius-sm: 6px;
      --radius-md: 10px;
      --radius-lg: 14px;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 360px;
      min-height: 480px;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: linear-gradient(180deg, var(--bg-primary) 0%, var(--bg-secondary) 100%);
      color: var(--text-primary);
      line-height: 1.5;
      overflow-x: hidden;
    }

    .container {
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .header {
      text-align: center;
      padding-bottom: 16px;
      border-bottom: 1px solid var(--border-color);
    }

    .logo {
      width: 48px;
      height: 48px;
      margin-bottom: 12px;
      background: linear-gradient(135deg, var(--accent-primary), var(--accent-active));
      border-radius: var(--radius-md);
      display: flex;
      align-items: center;
      justify-content: center;
      margin-left: auto;
      margin-right: auto;
      box-shadow: var(--shadow-sm);
    }

    .logo svg {
      width: 28px;
      height: 28px;
      fill: white;
    }

    h1 {
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 4px;
      letter-spacing: -0.3px;
    }

    .subtitle {
      font-size: 12px;
      color: var(--text-secondary);
    }

    .card {
      background: var(--bg-tertiary);
      border-radius: var(--radius-md);
      padding: 16px;
      border: 1px solid var(--border-color);
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .card:hover {
      transform: translateY(-1px);
      box-shadow: var(--shadow-md);
    }

    .form-group {
      margin-bottom: 16px;
    }

    .form-group:last-child {
      margin-bottom: 0;
    }

    label {
      display: block;
      font-size: 12px;
      font-weight: 500;
      color: var(--text-secondary);
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .input-wrapper {
      position: relative;
    }

    input[type="text"],
    select {
      width: 100%;
      padding: 12px 14px;
      background: var(--bg-primary);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-sm);
      color: var(--text-primary);
      font-size: 14px;
      transition: all 0.2s ease;
      outline: none;
    }

    input[type="text"]:focus,
    select:focus {
      border-color: var(--accent-primary);
      box-shadow: 0 0 0 3px rgba(62, 166, 255, 0.1);
    }

    input[type="text"]::placeholder {
      color: var(--text-muted);
    }

    .select-wrapper {
      position: relative;
    }

    .select-wrapper::after {
      content: '▼';
      position: absolute;
      right: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-secondary);
      font-size: 10px;
      pointer-events: none;
    }

    select {
      appearance: none;
      cursor: pointer;
      padding-right: 35px;
    }

    .toggle-group {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 0;
      border-bottom: 1px solid var(--border-color);
    }

    .toggle-group:last-of-type {
      border-bottom: none;
    }

    .toggle-label {
      display: flex;
      align-items: center;
      gap: 10px;
      cursor: pointer;
      flex: 1;
    }

    .toggle-text {
      font-size: 14px;
      color: var(--text-primary);
      font-weight: 500;
    }

    .toggle-description {
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 2px;
    }

    .toggle-icon {
      width: 20px;
      height: 20px;
      color: var(--accent-primary);
      flex-shrink: 0;
    }

    .switch {
      position: relative;
      display: inline-block;
      width: 44px;
      height: 24px;
      flex-shrink: 0;
    }

    .switch input {
      opacity: 0;
      width: 0;
      height: 0;
    }

    .slider {
      position: absolute;
      cursor: pointer;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-color: var(--bg-primary);
      transition: 0.3s;
      border-radius: 24px;
      border: 1px solid var(--border-color);
    }

    .slider:before {
      position: absolute;
      content: "";
      height: 18px;
      width: 18px;
      left: 2px;
      bottom: 2px;
      background-color: white;
      transition: 0.3s;
      border-radius: 50%;
      box-shadow: var(--shadow-sm);
    }

    input:checked + .slider {
      background-color: var(--accent-primary);
      border-color: var(--accent-primary);
    }

    input:checked + .slider:before {
      transform: translateX(20px);
    }

    input:focus + .slider {
      box-shadow: 0 0 0 3px rgba(62, 166, 166, 0.2);
    }

    .btn-primary {
      width: 100%;
      padding: 14px 20px;
      background: linear-gradient(135deg, var(--accent-primary), var(--accent-active));
      color: #000;
      border: none;
      border-radius: var(--radius-sm);
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      box-shadow: var(--shadow-sm);
      position: relative;
      overflow: hidden;
    }

    .btn-primary:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 20px rgba(62, 166, 255, 0.3);
    }

    .btn-primary:active {
      transform: translateY(0);
    }

    .btn-primary:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    .btn-primary svg {
      width: 18px;
      height: 18px;
      fill: currentColor;
    }

    .status {
      display: none;
      padding: 12px;
      border-radius: var(--radius-sm);
      font-size: 13px;
      text-align: center;
      animation: slideIn 0.3s ease;
    }

    .status.show {
      display: block;
    }

    .status.success {
      background: rgba(76, 175, 80, 0.1);
      border: 1px solid var(--success);
      color: var(--success);
    }

    .status.error {
      background: rgba(244, 67, 54, 0.1);
      border: 1px solid var(--error);
      color: var(--error);
    }

    .status.info {
      background: rgba(62, 166, 255, 0.1);
      border: 1px solid var(--accent-primary);
      color: var(--accent-primary);
    }

    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateY(-10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .quality-badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-size: 11px;
      padding: 2px 6px;
      border-radius: 4px;
      background: rgba(62, 166, 255, 0.1);
      color: var(--accent-primary);
      margin-left: 8px;
      font-weight: 600;
    }

    .shortcut-hint {
      text-align: center;
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 8px;
      padding-top: 12px;
      border-top: 1px solid var(--border-color);
    }

    kbd {
      background: var(--bg-primary);
      padding: 2px 6px;
      border-radius: 4px;
      border: 1px solid var(--border-color);
      font-family: monospace;
      font-size: 10px;
    }
  </style>
</head>
<body>
  <div class="container">
    <header class="header">
      <div class="logo" aria-hidden="true">
        <svg viewBox="0 0 24 24"><path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z"/></svg>
      </div>
      <h1>YT Downloader Pro</h1>
      <p class="subtitle">Native yt-dlp Integration</p>
    </header>

    <div class="card">
      <div class="form-group">
        <label for="savePath">Save Location</label>
        <div class="input-wrapper">
          <input 
            type="text" 
            id="savePath" 
            placeholder="Leave empty for default (~/Downloads/YT-Downloads/)"
            aria-describedby="pathHelp"
          >
        </div>
      </div>

      <div class="form-group">
        <label for="resolution">Quality Preference</label>
        <div class="select-wrapper">
          <select id="resolution" aria-label="Select download quality">
            <option value="audio">🎵 Audio Only (MP3)</option>
            <option value="2160">4K Ultra HD (2160p)</option>
            <option value="1440">2K Quad HD (1440p)</option>
            <option value="1080" selected>Full HD (1080p)</option>
            <option value="720">HD (720p)</option>
            <option value="480">SD (480p)</option>
            <option value="360">Low (360p)</option>
          </select>
        </div>
      </div>
    </div>

    <div class="card">
      <div class="toggle-group">
        <label class="toggle-label" for="subsToggle">
          <svg class="toggle-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M4 7h16M4 12h16M4 17h10"/>
          </svg>
          <div>
            <div class="toggle-text">Embed Subtitles</div>
            <div class="toggle-description">Auto-generated + manual captions</div>
          </div>
        </label>
        <label class="switch">
          <input type="checkbox" id="subsToggle" aria-label="Toggle subtitle embedding">
          <span class="slider"></span>
        </label>
      </div>

      <div class="toggle-group">
        <label class="toggle-label" for="playlistToggle">
          <svg class="toggle-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
            <line x1="9" y1="9" x2="15" y2="9"/>
            <line x1="9" y1="15" x2="15" y2="15"/>
          </svg>
          <div>
            <div class="toggle-text">Full Playlist</div>
            <div class="toggle-description">Download entire playlist/channel</div>
          </div>
        </label>
        <label class="switch">
          <input type="checkbox" id="playlistToggle" aria-label="Toggle playlist download">
          <span class="slider"></span>
        </label>
      </div>
    </div>

    <button id="downloadBtn" class="btn-primary" type="button">
      <svg viewBox="0 0 24 24"><path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z"/></svg>
      Launch Download
    </button>

    <div id="status" class="status" role="status" aria-live="polite"></div>

    <div class="shortcut-hint">
      Tip: Use the <kbd>YT Downloader</kbd> button on video pages for quick access
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
