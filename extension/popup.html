<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YT Downloader Pro</title>
  <style>
    :root {
      --bg-primary: #0f0f0f;
      --bg-secondary: #1a1a1a;
      --bg-tertiary: #252525;
      --accent-primary: #3ea6ff;
      --accent-hover: #65b8ff;
      --accent-active: #2a8fd4;
      --text-primary: #ffffff;
      --text-secondary: #aaaaaa;
      --text-muted: #717171;
      --border-color: #333333;
      --success: #4caf50;
      --warning: #ff9800;
      --error: #f44336;
      --shadow-sm: 0 2px 4px rgba(0,0,0,0.3);
      --shadow-md: 0 4px 12px rgba(0,0,0,0.4);
      --radius-sm: 6px;
      --radius-md: 10px;
      --radius-lg: 14px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Roboto', sans-serif; }
    body { width: 400px; background-color: var(--bg-primary); color: var(--text-primary); padding: 20px; }

    #updateNotice {
      display: none; background: rgba(62, 166, 255, 0.15); border: 1px solid var(--accent-primary);
      color: var(--accent-hover); padding: 10px; border-radius: var(--radius-sm); font-size: 13px;
      text-align: center; margin-bottom: 16px; font-weight: 500;
    }
    #updateNotice a { color: #fff; font-weight: bold; text-decoration: underline; margin-left: 5px; }

    .header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px; padding-bottom: 16px; border-bottom: 1px solid var(--border-color); }
    .header-left { display: flex; align-items: center; gap: 12px; }
    .header-icon { width: 32px; height: 32px; background: linear-gradient(135deg, #ff0000, #cc0000); border-radius: var(--radius-sm); display: flex; align-items: center; justify-content: center; box-shadow: 0 2px 8px rgba(255, 0, 0, 0.3); }
    .header-icon svg { width: 20px; height: 20px; fill: white; }
    .header-title { font-size: 18px; font-weight: 600; letter-spacing: 0.2px; }
    
    .gear-btn { background: transparent; border: none; cursor: pointer; color: var(--text-secondary); padding: 6px; border-radius: 50%; transition: all 0.2s ease; display: flex; align-items: center; }
    .gear-btn:hover { background: var(--bg-tertiary); color: var(--text-primary); transform: rotate(45deg); }
    .gear-btn svg { width: 22px; height: 22px; stroke: currentColor; fill: none; stroke-width: 2; }

    .form-group { margin-bottom: 20px; }
    .form-row { display: flex; gap: 12px; margin-bottom: 20px; }
    .form-row .form-group { margin-bottom: 0; flex: 1; }
    .form-label { display: block; font-size: 13px; font-weight: 500; color: var(--text-secondary); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.5px; }
    .form-control { width: 100%; background-color: var(--bg-secondary); border: 1px solid var(--border-color); color: var(--text-primary); padding: 12px 14px; border-radius: var(--radius-md); font-size: 14px; transition: all 0.2s ease; outline: none; }
    .form-control:focus { border-color: var(--accent-primary); box-shadow: 0 0 0 2px rgba(62, 166, 255, 0.2); }
    select.form-control { appearance: none; background-image: url("data:image/svg+xml;charset=US-ASCII,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%22292.4%22%20height%3D%22292.4%22%3E%3Cpath%20fill%3D%22%23aaaaaa%22%20d%3D%22M287%2069.4a17.6%2017.6%200%200%200-13-5.4H18.4c-5%200-9.3%201.8-12.9%205.4A17.6%2017.6%200%200%200%200%2082.2c0%205%201.8%209.3%205.4%2012.9l128%20127.9c3.6%203.6%207.8%205.4%2012.8%205.4s9.2-1.8%2012.8-5.4L287%2095c3.5-3.5%205.4-7.8%205.4-12.8%200-5-1.9-9.2-5.5-12.8z%22%2F%3E%3C%2Fsvg%3E"); background-repeat: no-repeat; background-position: right 14px top 50%; background-size: 10px auto; padding-right: 30px; }

    .settings-panel { background: var(--bg-secondary); border: 1px solid var(--accent-primary); border-radius: var(--radius-md); padding: 16px; margin-bottom: 24px; display: none; box-shadow: 0 4px 12px rgba(62, 166, 255, 0.1); }
    .adv-checkbox-group { display: flex; flex-direction: column; gap: 10px; margin-bottom: 16px; padding-bottom: 16px; border-bottom: 1px solid var(--border-color); }
    .adv-checkbox-label { display: flex; align-items: center; gap: 8px; font-size: 13px; color: var(--text-primary); cursor: pointer; }
    .adv-checkbox-label input { accent-color: var(--accent-primary); width: 16px; height: 16px; cursor: pointer; }

    .toggles-container { background-color: var(--bg-secondary); border-radius: var(--radius-md); padding: 4px 16px; margin-bottom: 24px; border: 1px solid var(--border-color); }
    .toggle-group { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid var(--border-color); }
    .toggle-label { display: flex; align-items: center; gap: 12px; cursor: pointer; }
    .toggle-icon { width: 20px; height: 20px; stroke: var(--text-secondary); }
    .toggle-text { font-size: 14px; font-weight: 500; }
    .toggle-description { font-size: 12px; color: var(--text-muted); margin-top: 2px; }
    
    .switch { position: relative; display: inline-block; width: 44px; height: 24px; }
    .switch input { opacity: 0; width: 0; height: 0; }
    .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: var(--bg-tertiary); transition: .3s cubic-bezier(0.4, 0.0, 0.2, 1); border-radius: 24px; }
    .slider:before { position: absolute; content: ""; height: 18px; width: 18px; left: 3px; bottom: 3px; background-color: var(--text-secondary); transition: .3s cubic-bezier(0.4, 0.0, 0.2, 1); border-radius: 50%; }
    input:checked + .slider { background-color: var(--accent-primary); }
    input:checked + .slider:before { transform: translateX(20px); background-color: white; }

    .btn-primary { width: 100%; background-color: var(--accent-primary); color: white; border: none; padding: 14px; border-radius: var(--radius-md); font-size: 15px; font-weight: 600; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; transition: all 0.2s ease; box-shadow: var(--shadow-sm); }
    .btn-primary:hover:not(:disabled) { background-color: var(--accent-hover); transform: translateY(-1px); box-shadow: var(--shadow-md); }
    .btn-primary:disabled { background-color: var(--bg-tertiary); color: var(--text-muted); cursor: not-allowed; box-shadow: none; }
    .btn-primary svg { width: 20px; height: 20px; fill: currentColor; }

    .status { margin-top: 16px; padding: 12px; border-radius: var(--radius-sm); font-size: 13px; text-align: center; display: none; animation: fadeIn 0.3s ease; }
    .status.show { display: block; }
    .status.error { background-color: rgba(244, 67, 54, 0.1); color: var(--error); border: 1px solid rgba(244, 67, 54, 0.2); }
    .status.success { background-color: rgba(76, 175, 80, 0.1); color: var(--success); border: 1px solid rgba(76, 175, 80, 0.2); }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(-4px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes spin { 100% { transform: rotate(360deg); } }
  </style>
</head>
<body>
  
  <div id="updateNotice"></div>

  <div class="header">
    <div class="header-left">
      <div class="header-icon"><svg viewBox="0 0 24 24"><path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z"/></svg></div>
      <div class="header-title">YT Downloader Pro</div>
    </div>
    <button class="gear-btn" id="settingsBtn" aria-label="Settings">
      <svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="3"></circle>
        <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
      </svg>
    </button>
  </div>

  <div id="settingsPanel" class="settings-panel">
    <div class="adv-checkbox-group">
      <label class="form-label" style="color: var(--accent-primary);">Advanced yt-dlp Flags</label>
      <label class="adv-checkbox-label"><input type="checkbox" id="flagMetadata" checked> Embed Metadata</label>
      <label class="adv-checkbox-label"><input type="checkbox" id="flagThumbnail" checked> Embed Thumbnail</label>
      <label class="adv-checkbox-label"><input type="checkbox" id="flagSponsor" checked> Remove SponsorBlock Segments</label>
    </div>
    
    <div class="form-group">
      <label class="form-label" for="customCommand">Custom Command Override</label>
      <input type="text" id="customCommand" class="form-control" placeholder="yt-dlp -f bestvideo+bestaudio..." style="font-family: monospace; font-size: 12px;">
      <div style="font-size: 10px; color: var(--warning); margin-top: 6px;">Overrides all UI settings below if used.</div>
    </div>

    <div class="form-group" style="margin-bottom: 0;">
      <label class="form-label" for="concurrentDownloads" style="color: var(--accent-primary);">⚡ Download Speed (IDM Mode)</label>
      <select id="concurrentDownloads" class="form-control" style="background-color: var(--bg-tertiary);">
        <option value="1">Standard (1x Connection)</option>
        <option value="4" selected>Fast (4x Connections)</option>
        <option value="8">Extreme (8x Connections)</option>
      </select>
    </div>
  </div>

  <div class="form-group">
    <label class="form-label" for="resolution">Quality</label>
    <select id="resolution" class="form-control">
      <option value="custom">⚙️ Custom Command</option>
      <option value="2160">4K (2160p)</option>
      <option value="1440">2K (1440p)</option>
      <option value="1080" selected>HD (1080p)</option>
      <option value="720">HD (720p)</option>
      <option value="480">SD (480p)</option>
      <option value="360">SD (360p)</option>
      <option value="audio">🎵 Audio Only</option>
    </select>
  </div>

  <div class="form-group" id="audioFormatWrapper" style="display: none; padding-left: 15px; border-left: 2px solid var(--accent-primary);">
    <label class="form-label" for="audioFormat">Audio Format</label>
    <select id="audioFormat" class="form-control">
      <option value="mp3" selected>MP3 (Standard)</option>
      <option value="flac">FLAC (Lossless Audiophile)</option>
      <option value="wav">WAV (Uncompressed)</option>
      <option value="m4a">M4A (Apple ALAC)</option>
    </select>
  </div>

  <div class="form-row">
    <div class="form-group">
      <label class="form-label" for="startTime">Start Time</label>
      <input type="text" id="startTime" class="form-control" placeholder="MM:SS or HH:MM:SS">
    </div>
    <div class="form-group">
      <label class="form-label" for="endTime">End Time</label>
      <input type="text" id="endTime" class="form-control" placeholder="MM:SS or HH:MM:SS">
    </div>
  </div>

  <div class="form-group">
    <label class="form-label" for="savePath">Save Directory (Optional)</label>
    <input type="text" id="savePath" class="form-control" placeholder="D:\Downloads\YouTube\" spellcheck="false">
  </div>

  <div class="toggles-container">
    <div class="toggle-group">
      <label class="toggle-label" for="subsToggle">
        <svg class="toggle-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2v10z"/><path d="M13 8H7M17 12H7"/></svg>
        <div>
          <div class="toggle-text">Embed Subtitles</div>
          <div class="toggle-description">Auto-download English CC</div>
        </div>
      </label>
      <label class="switch"><input type="checkbox" id="subsToggle" aria-label="Toggle subtitle embedding"><span class="slider"></span></label>
    </div>

    <div class="toggle-group" style="border-bottom: none;">
      <label class="toggle-label" for="playlistToggle">
        <svg class="toggle-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><line x1="9" y1="9" x2="15" y2="9"/><line x1="9" y1="15" x2="15" y2="15"/></svg>
        <div>
          <div class="toggle-text">Full Playlist</div>
          <div class="toggle-description">Download entire playlist/channel</div>
        </div>
      </label>
      <label class="switch"><input type="checkbox" id="playlistToggle" aria-label="Toggle playlist download"><span class="slider"></span></label>
    </div>

    <div class="form-group playlist-options" id="playlistOptions" style="display: none; padding-left: 36px; margin-top: 10px; margin-bottom: 12px;">
      <label class="form-label" for="playlistItems" style="font-size: 11px;">Specific Videos (Optional)</label>
      <input type="text" id="playlistItems" class="form-control" placeholder="1-5, 8, 11-13" style="padding: 8px; font-size: 13px;">
      <div style="font-size: 10px; color: var(--text-muted); margin-top: 4px;">Use commas for single videos, hyphens for ranges.</div>
    </div>

    <div class="toggle-group" style="border-top: 1px solid var(--border-color);">
      <label class="toggle-label" for="cookiesToggle">
        <svg class="toggle-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2a10 10 0 1 0 10 10 4 4 0 0 1-5-5 4 4 0 0 1-5-5zm0 0a10 10 0 1 0 10 10 4 4 0 0 1-5-5 4 4 0 0 1-5-5z"/><circle cx="8.5" cy="8.5" r="1.5"/><circle cx="15.5" cy="11.5" r="1.5"/><circle cx="10.5" cy="15.5" r="1.5"/></svg>
        <div>
          <div class="toggle-text">Bypass Age & Bot issue</div>
          <div class="toggle-description">Uses cookies to fix bot/age issues</div>
        </div>
      </label>
      <label class="switch"><input type="checkbox" id="cookiesToggle" aria-label="Toggle cookie usage"><span class="slider"></span></label>
    </div>
  </div>

  <button id="downloadBtn" class="btn-primary" type="button">
    <svg viewBox="0 0 24 24"><path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z"/></svg>
    <span>Launch Download</span>
  </button>

  <div id="status" class="status" role="alert"></div>

  <script src="popup.js"></script>
</body>
</html>
